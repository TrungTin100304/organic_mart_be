spring.config.import=optional:file:.env[.properties]

spring.application.name=${SPRING_APPLICATION_NAME}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL}
server.port=${SERVER_PORT}

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION}

spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE}


spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=${SPRING_FLYWAY_BASELINE_VERSION:0}
spring.flyway.validate-on-migrate=${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}
spring.flyway.clean-disabled=true

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

vietqr.bank-id=${VIETQR_BANK_ID:}
vietqr.bank-code=${VIETQR_BANK_CODE:}
vietqr.account-no=${VIETQR_ACCOUNT_NO:}
vietqr.account-name=${VIETQR_ACCOUNT_NAME:}
vietqr.template=${VIETQR_TEMPLATE:compact2}

sepay.enabled=${SEPAY_ENABLED:false}
sepay.webhook-api-key=${SEPAY_WEBHOOK_API_KEY:}
sepay.bank-account=${SEPAY_BANK_ACCOUNT:}
sepay.bank-code=${SEPAY_BANK_CODE:}

internal-delivery.standard-fee=${DELIVERY_STANDARD_FEE:0}
internal-delivery.express-fee=${DELIVERY_EXPRESS_FEE:20000}
internal-delivery.scheduled-fee=${DELIVERY_SCHEDULED_FEE:0}
internal-delivery.express-minutes=${DELIVERY_EXPRESS_MINUTES:30}
internal-delivery.standard-minutes=${DELIVERY_STANDARD_MINUTES:60}

gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
gemini.timeout-seconds=${GEMINI_TIMEOUT:60}
meal-plan.max-days=${MEAL_PLAN_MAX_DAYS:7}
meal-plan.max-meals-per-day=${MEAL_PLAN_MAX_MEALS:4}
meal-plan.max-generations-per-hour=${MEAL_PLAN_MAX_PER_HOUR:5}

shipping.demo-enabled=${SHIPPING_DEMO_ENABLED:false}
